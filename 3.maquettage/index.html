<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Kit Gallery - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>

<body class="bg-gray-50 flex h-full overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full flex-shrink-0">
        <div class="p-4 border-b border-gray-200">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">Soli<span class="text-soli-action">Quiz</span>
            </h1>
            <p class="text-xs text-gray-500 mt-1">Project: SoliQuiz (Preline UI Library)</p>
        </div>
        <nav id="sidebar-nav" class="flex-1 overflow-y-auto p-4 space-y-6">

            <!-- Context -->
            <section>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Fondations</h3>
                <div class="space-y-1">
                    <button onclick="loadComponent('charte-graphique/index.html', 'Charte Graphique')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">🎨
                        Charte Graphique</button>
                </div>
            </section>

            <!-- Atoms -->
            <section>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Atoms (Preline)</h3>
                <div class="space-y-1">
                    <button onclick="loadComponent('components-lib/atoms/alert-error/index.html', 'Alert Error')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Alert
                        Error</button>
                    <button onclick="loadComponent('components-lib/atoms/button-primary/index.html', 'Button Primary')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Button
                        Primary</button>
                    <button onclick="loadComponent('components-lib/atoms/heading-1/index.html', 'Heading 1')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Heading
                        1</button>
                    <button onclick="loadComponent('components-lib/atoms/input-text/index.html', 'Input Text')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Input
                        Text</button>
                    <button onclick="loadComponent('components-lib/atoms/label/index.html', 'Label')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Label</button>
                </div>
            </section>

            <!-- Molecules -->
            <section>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Molecules (Preline)</h3>
                <div class="space-y-1">
                    <button onclick="loadComponent('components-lib/molecules/form-group/index.html', 'Form Group')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Form
                        Group</button>
                    <button onclick="loadComponent('components-lib/molecules/login-form/index.html', 'Login Form')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Login
                        Form</button>
                    <button onclick="loadComponent('components-lib/molecules/navbar/index.html', 'Navbar')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Navbar</button>
                    <button onclick="loadComponent('components-lib/molecules/stat-card/index.html', 'Stat Card')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Stat
                        Card</button>
                    <button
                        onclick="loadComponent('components-lib/molecules/activity-list/index.html', 'Activity List')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Activity
                        List</button>
                    <button onclick="loadComponent('components-lib/molecules/action-card/index.html', 'Action Card')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Action
                        Card</button>
                    <button onclick="loadComponent('components-lib/molecules/quiz-header/index.html', 'Quiz Header')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Quiz
                        Header</button>
                    <button
                        onclick="loadComponent('components-lib/molecules/choice-container/index.html', 'Choice Container (Unique)')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Choice
                        Container (Unique)</button>
                    <button
                        onclick="loadComponent('components-lib/molecules/choice-container/multiple.html', 'Choice Container (Multiple)')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors">Choice
                        Container (Multiple)</button>
                </div>
            </section>

            <!-- Mockups -->
            <section>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Mockups (Assemblement)
                </h3>
                <div id="mockups-list" class="space-y-1">
                    <button onclick="loadComponent('mockups/login.html', 'Mockup - Connexion')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors font-medium">🚀
                        Page Connexion</button>
                    <button onclick="loadComponent('mockups/dashboard.html', 'Mockup - Dashboard')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors font-medium">📊
                        Tableau de bord</button>
                    <button onclick="loadComponent('mockups/passer-qcm.html', 'Mockup - Passer QCM')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors font-medium">📝
                        Passer un QCM</button>
                    <button onclick="loadComponent('mockups/creer-qcm.html', 'Mockup - Créer QCM')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors font-medium">🛠
                        Création QCM</button>
                    <button onclick="loadComponent('mockups/resultats.html', 'Mockup - Résultats')"
                        class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-gray-100 transition-colors font-medium">🏆
                        Résultats & Feedback</button>
                </div>
            </section>

        </nav>
        <div class="p-4 border-t text-xs text-center text-gray-400 italic">SoliQuiz · UI Gallery (Preline Edition)</div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-slate-100">
        <div class="bg-white border-b border-gray-200 px-4 py-2 flex justify-between items-center shadow-sm z-10">
            <h2 id="component-title" class="text-sm font-semibold text-gray-700">Sélectionnez un composant</h2>
            <div class="flex gap-2">
                <a id="open-new-tab" href="#" target="_blank"
                    class="text-xs px-3 py-1.5 border rounded hover:bg-gray-50 text-gray-600 flex items-center gap-1 hidden">Ouvrir</a>
                <div class="flex bg-gray-100 rounded p-0.5 text-xs font-medium">
                    <button onclick="resizeIframe('100%')"
                        class="px-3 py-1.5 rounded hover:bg-white shadow-sm transition-all">Desktop</button>
                    <button onclick="resizeIframe('768px')"
                        class="px-3 py-1.5 rounded hover:bg-white transition-all">Tablet</button>
                    <button onclick="resizeIframe('375px')"
                        class="px-3 py-1.5 rounded hover:bg-white transition-all">Mobile</button>
                </div>
            </div>
        </div>
        <div class="flex-1 overflow-hidden flex justify-center relative">
            <iframe id="preview-frame" src="charte-graphique/index.html"
                class="w-full h-full border-0 bg-white shadow-lg transition-all duration-300"></iframe>
        </div>
    </main>

    <script>
        function loadComponent(path, title) {
            const frame = document.getElementById('preview-frame');
            const titleEl = document.getElementById('component-title');
            const openLink = document.getElementById('open-new-tab');
            frame.classList.add('opacity-0');
            setTimeout(() => {
                frame.src = path;
                titleEl.textContent = title;
                openLink.href = path;
                openLink.classList.remove('hidden');
                frame.onload = () => frame.classList.remove('opacity-0');
            }, 100);
        }
        function resizeIframe(width) {
            const frame = document.getElementById('preview-frame');
            frame.style.width = width;
            if (width !== '100%') {
                frame.classList.add('mx-auto', 'my-4', 'h-[calc(100%-2rem)]');
            } else {
                frame.classList.remove('mx-auto', 'my-4', 'h-[calc(100%-2rem)]');
            }
        }
    </script>
</body>

</html>
