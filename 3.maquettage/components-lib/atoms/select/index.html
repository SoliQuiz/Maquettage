<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Select - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-10 space-y-6 max-w-xs">

    <!-- Session Select -->
    <div class="max-w-xs">
        <label for="select-session" class="block text-sm font-medium mb-2 dark:text-white">Session associée</label>
        <select id="select-session"
            class="py-3 px-4 pe-9 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600">
            <option selected value="">-- Sélectionner une session --</option>
            <option value="s1">Session Dev Web – Semaine 3</option>
            <option value="s2">Session Algorithmique – Semaine 5</option>
        </select>
    </div>

    <!-- Objectif Select -->
    <div class="max-w-xs">
        <label for="select-objectif" class="block text-sm font-medium mb-2 dark:text-white">Micro-objectif</label>
        <select id="select-objectif"
            class="py-3 px-4 pe-9 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600">
            <option selected value="">-- Sélectionner un objectif --</option>
            <option value="o1">Comprendre les boucles</option>
            <option value="o2">Maîtriser les tableaux JS</option>
        </select>
    </div>

</body>

</html>
