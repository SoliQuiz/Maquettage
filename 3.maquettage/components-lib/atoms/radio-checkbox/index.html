<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Radio & Checkbox - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1', 600: '#4f46e5', 50: '#eef2ff' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-10 space-y-8 max-w-lg">

    <!-- Groupe Radio (choix unique) -->
    <div class="space-y-3">
        <div class="flex flex-col gap-2">
            <div class="flex items-center gap-x-2">
                <input type="radio" name="hs-radio-group"
                    class="shrink-0 mt-0.5 border-gray-200 rounded-full text-blue-600 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800"
                    id="hs-radio-group-1" checked>
                <label for="hs-radio-group-1" class="text-sm text-gray-500 ms-2 dark:text-neutral-400">Choix A — Une
                    Réponse (Correct)</label>
            </div>

            <div class="flex items-center gap-x-2">
                <input type="radio" name="hs-radio-group"
                    class="shrink-0 mt-0.5 border-gray-200 rounded-full text-blue-600 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800"
                    id="hs-radio-group-2">
                <label for="hs-radio-group-2" class="text-sm text-gray-500 ms-2 dark:text-neutral-400">Choix B — Une
                    autre réponse</label>
            </div>
        </div>
    </div>

    <!-- Groupe Checkbox (choix multiples) -->
    <div class="space-y-3 mt-8">
        <div class="flex flex-col gap-2">
            <div class="flex items-center gap-x-2">
                <input type="checkbox"
                    class="shrink-0 mt-0.5 border-gray-200 rounded text-blue-600 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800"
                    id="hs-checkbox-group-1">
                <label for="hs-checkbox-group-1" class="text-sm text-gray-500 ms-3 dark:text-neutral-400">Choix A —
                    Option multiple 1</label>
            </div>

            <div class="flex items-center gap-x-2">
                <input type="checkbox"
                    class="shrink-0 mt-0.5 border-gray-200 rounded text-blue-600 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800"
                    id="hs-checkbox-group-2">
                <label for="hs-checkbox-group-2" class="text-sm text-gray-500 ms-3 dark:text-neutral-400">Choix B —
                    Option multiple 2</label>
            </div>
        </div>
    </div>

</body>

</html>
