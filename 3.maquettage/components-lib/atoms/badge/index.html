<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Badge - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 100: '#e0e7ff', 700: '#4338ca' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-10 flex flex-wrap gap-4 items-start">

    <!-- Module -->
    <span
        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-800/30 dark:text-blue-500">
        Dev Web
    </span>

    <!-- Succès -->
    <span
        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-teal-100 text-teal-800 dark:bg-teal-800/30 dark:text-teal-500">
        <span class="size-1.5 inline-block rounded-full bg-teal-800 dark:bg-teal-500"></span>
        Réussi
    </span>

    <!-- Erreur -->
    <span
        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-800/30 dark:text-red-500">
        <span class="size-1.5 inline-block rounded-full bg-red-800 dark:bg-red-500"></span>
        Échoué
    </span>

    <!-- Warning (pour formateur) -->
    <span
        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800 dark:bg-yellow-800/30 dark:text-yellow-500">
        ⚠️ En difficulté
    </span>

    <!-- API Connectée -->
    <span
        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-teal-100 text-teal-800 dark:bg-teal-800/30 dark:text-teal-500 border border-teal-200 dark:border-teal-800">
        <span class="size-2 inline-block rounded-full bg-teal-500 animate-pulse"></span>
        API Connectée
    </span>

    <!-- Statut neutre -->
    <span
        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-gray-100 text-gray-800 dark:bg-white/10 dark:text-white">
        Brouillon
    </span>

</body>

</html>
