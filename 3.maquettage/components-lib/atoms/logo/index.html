<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Logo - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1', 600: '#4f46e5' }, secondary: { 500: '#14b8a6' } }, fontFamily: { heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 p-10 flex flex-col gap-8 items-start">

    <!-- Logo Standard (Header) -->
    <a href="#" class="flex flex-none items-center gap-x-2 text-xl font-semibold dark:text-white" aria-label="SoliQuiz">
        <div class="size-9 flex-shrink-0 bg-blue-600 flex items-center justify-center rounded-lg shadow-sm">
            <span class="text-white font-bold text-lg">SQ</span>
        </div>
        SoliQuiz
    </a>

    <!-- Logo Grand (Page Login) -->
    <div class="flex flex-col items-center gap-y-4">
        <div class="size-20 flex-shrink-0 bg-blue-600 flex items-center justify-center rounded-2xl shadow-md">
            <span class="text-white font-bold text-3xl">SQ</span>
        </div>
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-800 dark:text-neutral-200">SoliQuiz</h1>
            <p class="text-sm text-gray-500 dark:text-neutral-500">Plateforme d'auto-évaluation</p>
        </div>
    </div>

</body>

</html>
