<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Progress Bar - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1', 100: '#e0e7ff' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-10 space-y-8 max-w-lg">

    <!-- Jauge Standard (Compétences) -->
    <div>
        <div class="flex justify-between items-center mb-2">
            <span class="text-sm font-medium text-slate-700">Algorithmique</span>
            <span class="text-sm font-semibold text-primary-600">80%</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2.5" role="progressbar" aria-valuenow="80" aria-valuemin="0"
            aria-valuemax="100">
            <div class="bg-primary-500 h-2.5 rounded-full transition-all duration-500" style="width: 80%"></div>
        </div>
    </div>

    <!-- Jauge Danger (faible score) -->
    <div>
        <div class="flex justify-between items-center mb-2">
            <span class="text-sm font-medium text-slate-700">Syntaxe CSS</span>
            <span class="text-sm font-semibold text-red-600">25%</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2.5" role="progressbar" aria-valuenow="25" aria-valuemin="0"
            aria-valuemax="100">
            <div class="bg-red-500 h-2.5 rounded-full transition-all duration-500" style="width: 25%"></div>
        </div>
    </div>

    <!-- Jauge Pagination (QCM) — Plus épaisse -->
    <div>
        <div class="flex justify-between items-center mb-2">
            <span class="text-sm text-slate-500">Question 3 / 12</span>
            <span class="text-sm font-semibold text-slate-700">25%</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-4" role="progressbar" aria-valuenow="25" aria-valuemin="0"
            aria-valuemax="100">
            <div class="bg-gradient-to-r from-primary-500 to-secondary-500 h-4 rounded-full transition-all duration-300"
                style="width: 25%"></div>
        </div>
    </div>

</body>

</html>
