<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Progress Bar - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1', 100: '#e0e7ff' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-10 space-y-8 max-w-lg">

    <!-- Jauge Standard (Compétences) -->
    <div>
        <div class="flex justify-between items-center mb-1.5">
            <span class="text-sm font-medium text-gray-800 dark:text-white">Algorithmique</span>
            <span class="text-sm font-medium text-gray-800 dark:text-white">80%</span>
        </div>
        <div class="flex w-full h-2 bg-gray-200 rounded-full overflow-hidden dark:bg-neutral-700" role="progressbar"
            aria-valuenow="80" aria-valuemin="0" aria-valuemax="100">
            <div class="flex flex-col justify-center overflow-hidden bg-blue-600 text-xs text-white text-center whitespace-nowrap transition duration-500 dark:bg-blue-500"
                style="width: 80%"></div>
        </div>
    </div>

    <!-- Jauge Danger (faible score) -->
    <div>
        <div class="flex justify-between items-center mb-1.5">
            <span class="text-sm font-medium text-gray-800 dark:text-white">Syntaxe CSS</span>
            <span class="text-sm font-medium text-red-600 dark:text-red-500">25%</span>
        </div>
        <div class="flex w-full h-2 bg-gray-200 rounded-full overflow-hidden dark:bg-neutral-700" role="progressbar"
            aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
            <div class="flex flex-col justify-center overflow-hidden bg-red-600 text-xs text-white text-center whitespace-nowrap transition duration-500 dark:bg-red-500"
                style="width: 25%"></div>
        </div>
    </div>

    <!-- Jauge Pagination (QCM) — Plus épaisse -->
    <div>
        <div class="flex justify-between items-center mb-1.5">
            <span class="text-sm font-medium text-gray-800 dark:text-white">Question 3 / 12</span>
            <span class="text-sm font-medium text-gray-800 dark:text-white">25%</span>
        </div>
        <div class="flex w-full h-4 bg-gray-200 rounded-full overflow-hidden dark:bg-neutral-700" role="progressbar"
            aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
            <div class="flex flex-col justify-center overflow-hidden bg-blue-600 text-xs text-white text-center whitespace-nowrap transition duration-500 dark:bg-blue-500"
                style="width: 25%"></div>
        </div>
    </div>

</body>

</html>
