<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Blockquote - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-10 max-w-lg space-y-6">

    <!-- Explication du formateur (Correction) -->
    <blockquote class="relative pl-4 border-l-4 border-primary-400 py-1">
        <p class="text-sm text-slate-600 italic leading-relaxed">
            «&nbsp;Cette réponse est correcte car une boucle <code
                class="font-mono text-xs bg-slate-100 px-1 rounded">forEach</code> ne peut pas être interrompue avec
            <code class="font-mono text-xs bg-slate-100 px-1 rounded">break</code>, contrairement à une boucle <code
                class="font-mono text-xs bg-slate-100 px-1 rounded">for</code> classique.&nbsp;»
        </p>
        <footer class="mt-2 text-xs text-slate-400 font-medium">Explication du formateur</footer>
    </blockquote>

</body>

</html>
