<!DOCTYPE html>
<html lang="fr">

<head>

</head>

<body class="p-4">

                        <path d="M18 6 6 18" />

                </span>
            </div>
            <div class="ms-3">
                <h3 class="text-gray-800 font-semibold text-sm">Erreur détectée.</h3>
                <p class="text-sm text-gray-700 mt-1">Veuillez vérifier vos identifiants et réessayer.</p>
