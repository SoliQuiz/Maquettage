<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Nav Link - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1', 600: '#4f46e5', 50: '#eef2ff' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-10 flex flex-wrap gap-6 items-center">

    <!-- Lien de navigation standard -->
    <a href="#"
        class="text-sm font-medium text-slate-600 hover:text-primary-600 transition-colors duration-150 relative group">
        Tableau de bord
        <span
            class="absolute bottom-0 left-0 w-0 group-hover:w-full h-0.5 bg-primary-500 transition-all duration-200 rounded-full"></span>
    </a>

    <!-- Lien actif (page courante) -->
    <a href="#" aria-current="page"
        class="text-sm font-semibold text-primary-600 transition-colors duration-150 relative">
        Bibliothèque QCM
        <span class="absolute bottom-0 left-0 w-full h-0.5 bg-primary-500 rounded-full"></span>
    </a>

    <!-- Lien de retour -->
    <a href="#"
        class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors duration-150">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        Retour au tableau de bord
    </a>

    <!-- Lien discret (footer) -->
    <a href="#"
        class="text-xs text-slate-400 hover:text-slate-600 underline-offset-2 hover:underline transition-colors duration-150">
        Un problème de connexion ?
    </a>

</body>

</html>
