<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Input - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1', 600: '#4f46e5' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-10 space-y-6 max-w-sm">

    <!-- Email -->
    <div class="max-w-sm">
        <label for="input-label" class="block text-sm font-medium mb-2 dark:text-white">Adresse email</label>
        <input type="email" id="input-label"
            class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600"
            placeholder="votre@email.com">
    </div>

    <!-- Password -->
    <div class="max-w-sm">
        <label for="input-label-password" class="block text-sm font-medium mb-2 dark:text-white">Mot de passe</label>
        <input type="password" id="input-label-password"
            class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600"
            placeholder="••••••••">
    </div>

    <!-- Text / Recherche -->
    <div class="max-w-sm">
        <label for="input-label-title" class="block text-sm font-medium mb-2 dark:text-white">Titre du QCM</label>
        <input type="text" id="input-label-title"
            class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600"
            placeholder="Ex: QCM Algorithmique S3">
    </div>

</body>

</html>
