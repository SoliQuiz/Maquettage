<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Input - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1', 600: '#4f46e5' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-10 space-y-6 max-w-sm">

    <!-- Email -->
    <div class="flex flex-col gap-1.5">
        <label for="input-email" class="text-sm font-semibold text-slate-700">Adresse email</label>
        <input type="email" id="input-email" name="email" placeholder="votre@email.com" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-slate-800 text-sm bg-white placeholder-slate-400 
             focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500,
             hover:border-slate-400 transition-all duration-200" required />
    </div>

    <!-- Password -->
    <div class="flex flex-col gap-1.5">
        <label for="input-password" class="text-sm font-semibold text-slate-700">Mot de passe</label>
        <input type="password" id="input-password" name="password" placeholder="••••••••" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-slate-800 text-sm bg-white placeholder-slate-400
             focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500
             hover:border-slate-400 transition-all duration-200" required />
    </div>

    <!-- Text / Recherche -->
    <div class="flex flex-col gap-1.5">
        <label for="input-text" class="text-sm font-semibold text-slate-700">Titre du QCM</label>
        <input type="text" id="input-text" name="title" placeholder="Ex: QCM Algorithmique S3" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-slate-800 text-sm bg-white placeholder-slate-400
             focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500
             hover:border-slate-400 transition-all duration-200" />
    </div>

</body>

</html>
