<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule: Evaluation Header - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1' }, secondary: { 500: '#14b8a6' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-100 font-sans">

    <!-- En-tête fixe de la salle d'évaluation -->
    <header class="sticky top-0 z-50 bg-white border-b border-slate-100 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between gap-4">

            <!-- Logo + Titre -->
            <div class="flex items-center gap-3 min-w-0">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center shrink-0">
                    <span class="text-white font-heading font-bold text-sm">SQ</span>
                </div>
                <h1 class="font-heading font-semibold text-base text-slate-900 truncate">
                    QCM – Algorithmique S3
                </h1>
            </div>

            <!-- Timer + Autosave -->
            <div class="flex items-center gap-4 shrink-0">
                <!-- Autosave indicator -->
                <span class="hidden sm:inline-flex items-center gap-1.5 text-xs text-slate-400 font-medium">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>
                    Sauvegardé
                </span>

                <!-- Timer normal -->
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl bg-white border border-slate-200 shadow-sm"
                    role="timer" aria-label="Temps restant">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span class="text-base font-mono font-bold text-slate-800">15:30</span>
                </div>
            </div>
        </div>
    </header>

    <div class="p-8 text-slate-400 text-sm text-center">↑ En-tête fixe de l'évaluation (Timer + logo + autosave)</div>

</body>

</html>
