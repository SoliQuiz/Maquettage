<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule: Evaluation Header - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 500: '#6366f1' }, secondary: { 500: '#14b8a6' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-100 font-sans">

    <!-- En-tête fixe de la salle d'évaluation -->
    <header
        class="sticky top-0 z-50 flex flex-wrap sm:justify-start sm:flex-nowrap w-full bg-white border-b border-gray-200 text-sm py-3 dark:bg-neutral-800 dark:border-neutral-700">
        <nav class="max-w-4xl w-full mx-auto px-4 flex items-center justify-between gap-x-4">
            <!-- Logo + Titre -->
            <div class="flex items-center gap-x-3">
                <div class="size-8 flex-shrink-0 bg-blue-600 flex items-center justify-center rounded-lg shadow-sm">
                    <span class="text-white font-bold text-xs">SQ</span>
                </div>
                <h1 class="text-base font-semibold text-gray-800 truncate dark:text-neutral-200">
                    QCM – Algorithmique S3
                </h1>
            </div>

            <!-- Timer + Autosave -->
            <div class="flex items-center gap-x-4">
                <span
                    class="hidden sm:inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-teal-100 text-teal-800 dark:bg-teal-800/30 dark:text-teal-500">
                    <span class="size-1.5 inline-block rounded-full bg-teal-800 dark:bg-teal-500"></span>
                    Sauvegardé
                </span>

                <span
                    class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-gray-100 text-gray-800 dark:bg-white/10 dark:text-white border border-gray-200 dark:border-neutral-700">
                    <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    15:30
                </span>
            </div>
        </nav>
    </header>

    <div class="p-8 text-slate-400 text-sm text-center">↑ En-tête fixe de l'évaluation (Timer + logo + autosave)</div>

</body>

</html>
