<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule: Result Summary - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 500: '#6366f1', 600: '#4f46e5' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-8 max-w-2xl mx-auto">

    <!-- Récap résultat global -->
    <div
        class="relative overflow-hidden bg-white border border-gray-200 shadow-xl rounded-2xl p-10 dark:bg-neutral-900 dark:border-neutral-800 text-center">
        <!-- Background accent -->
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-blue-600/5 rounded-full -translate-y-1/2 translate-x-1/2 blur-2xl pointer-events-none">
        </div>

        <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-8">Vos résultats et corrections détaillées</h1>

        <!-- Score circulaire -->
        <div
            class="inline-flex flex-col items-center justify-center size-40 rounded-full border-8 border-blue-50 bg-blue-600 text-white shadow-2xl mx-auto mb-8 transform hover:scale-105 transition-transform duration-300">
            <span class="text-4xl font-black leading-none">16/20</span>
            <span class="text-xs font-bold opacity-80 mt-1 uppercase tracking-widest">Score</span>
        </div>

        <p class="text-xl font-bold text-gray-800 dark:text-neutral-200 mb-2">Bon travail !</p>
        <p class="text-sm text-gray-500 dark:text-neutral-400 mb-10 max-w-sm mx-auto">Vous avez obtenu un bon score.
            Analysez les détails ci-dessous pour progresser.</p>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-x-6 border-t border-gray-100 pt-8 dark:border-neutral-800">
            <div>
                <p class="text-3xl font-black text-blue-600 dark:text-blue-500">8</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest dark:text-neutral-500 mt-1">
                    Bonnes</p>
            </div>
            <div class="border-x border-gray-100 dark:border-neutral-800 px-6 font-bold">
                <p class="text-3xl font-black text-red-500 dark:text-red-400">2</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest dark:text-neutral-500 mt-1">
                    Mauvaises</p>
            </div>
            <div>
                <p class="text-3xl font-black text-gray-400 dark:text-neutral-600">10</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest dark:text-neutral-500 mt-1">
                    Total</p>
            </div>
        </div>
    </div>

</body>

</html>
