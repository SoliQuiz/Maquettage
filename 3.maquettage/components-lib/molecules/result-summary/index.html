<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule: Result Summary - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 500: '#6366f1', 600: '#4f46e5' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-8 max-w-2xl mx-auto">

    <!-- Récap résultat global -->
    <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-200 text-center">
        <h1 class="font-heading font-bold text-2xl text-slate-900 mb-6">Vos résultats et corrections détaillées</h1>

        <!-- Score en pleine largeur -->
        <div
            class="inline-flex flex-col items-center justify-center w-36 h-36 rounded-full bg-gradient-to-br from-green-400 to-teal-500 text-white shadow-lg mx-auto mb-6">
            <span class="font-heading font-bold text-4xl leading-none">16/20</span>
            <span class="text-sm font-medium opacity-90 mt-1">80%</span>
        </div>

        <p class="text-lg font-semibold text-slate-800 mb-1">Bon travail !</p>
        <p class="text-sm text-slate-500 leading-relaxed">Vous avez obtenu un bon score. Analysez les détails ci-dessous
            pour progresser.</p>

        <!-- Mini stats -->
        <div class="mt-6 grid grid-cols-3 gap-4 border-t border-slate-100 pt-6">
            <div>
                <p class="text-2xl font-heading font-bold text-slate-900">8</p>
                <p class="text-xs text-slate-500 mt-1">Bonnes réponses</p>
            </div>
            <div class="border-x border-slate-100">
                <p class="text-2xl font-heading font-bold text-red-500">2</p>
                <p class="text-xs text-slate-500 mt-1">Mauvaises réponses</p>
            </div>
            <div>
                <p class="text-2xl font-heading font-bold text-slate-900">10</p>
                <p class="text-xs text-slate-500 mt-1">Total questions</p>
            </div>
        </div>
    </div>

</body>

</html>
