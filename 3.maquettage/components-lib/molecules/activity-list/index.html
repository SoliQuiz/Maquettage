<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
</head>

<body class="p-4">
    <!-- Activity List (Table from Preline UI) -->
    <div class="flex flex-col">
        <div class="-m-1.5 overflow-x-auto">
            <div class="p-1.5 min-w-full inline-block align-middle">
                <div class="border border-soli rounded-xl overflow-hidden bg-white">
                    <table class="min-w-full divide-y divide-soli">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col"
                                    class="px-6 py-3 text-start text-xs font-medium text-soli-muted uppercase">Date</th>
                                <th scope="col"
                                    class="px-6 py-3 text-start text-xs font-medium text-soli-muted uppercase">
                                    QCM/Activité</th>
                                <th scope="col"
                                    class="px-6 py-3 text-start text-xs font-medium text-soli-muted uppercase">
                                    Statut/Score</th>
                                <th scope="col"
                                    class="px-6 py-3 text-end text-xs font-medium text-soli-muted uppercase">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-soli">
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">03/03/2026</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-soli-dark">Algorithmes
                                    de Recherche</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm">
                                    <span
                                        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                        18/20
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                                    <button type="button"
                                        class="inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent text-soli-action hover:text-soli-dark disabled:opacity-50 disabled:pointer-events-none transition-all">Détails</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">02/03/2026</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-soli-dark">Bases du
                                    JavaScript</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm">
                                    <span
                                        class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
                                        En cours
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                                    <button type="button"
                                        class="inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent text-soli-action hover:text-soli-dark disabled:opacity-50 disabled:pointer-events-none transition-all">Continuer</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
