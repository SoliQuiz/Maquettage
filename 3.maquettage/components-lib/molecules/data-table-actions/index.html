<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule: Data Table Actions - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 600: '#4f46e5' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-8">

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="text-left px-5 py-3 font-semibold text-slate-600 text-xs uppercase tracking-wider">Titre
                        QCM</th>
                    <th class="text-left px-5 py-3 font-semibold text-slate-600 text-xs uppercase tracking-wider">
                        Objectif associé</th>
                    <th class="text-left px-5 py-3 font-semibold text-slate-600 text-xs uppercase tracking-wider">
                        Questions</th>
                    <th class="text-right px-5 py-3 font-semibold text-slate-600 text-xs uppercase tracking-wider">
                        Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="px-5 py-4 font-medium text-slate-900">QCM Algorithmique S3</td>
                    <td class="px-5 py-4 text-slate-500"><span
                            class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-primary-100 text-primary-700">Boucles
                            et tableaux</span></td>
                    <td class="px-5 py-4 text-slate-500">10</td>
                    <td class="px-5 py-4">
                        <div class="flex items-center justify-end gap-1">
                            <button type="button" aria-label="Éditer"
                                class="p-2 rounded-lg text-slate-400 hover:text-primary-600 hover:bg-primary-50 transition-all opacity-0 group-hover:opacity-100">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M16.862 3.487a2.25 2.25 0 013.182 3.181L7.5 19.213l-4.5 1 1-4.5 12.862-12.226z" />
                                </svg>
                            </button>
                            <button type="button" aria-label="Supprimer"
                                class="p-2 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50 transition-all opacity-0 group-hover:opacity-100">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="px-5 py-4 font-medium text-slate-900">QCM Syntaxe CSS</td>
                    <td class="px-5 py-4 text-slate-500"><span
                            class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-primary-100 text-primary-700">Flexbox
                            & Grid</span></td>
                    <td class="px-5 py-4 text-slate-500">8</td>
                    <td class="px-5 py-4">
                        <div class="flex items-center justify-end gap-1">
                            <button type="button" aria-label="Éditer"
                                class="p-2 rounded-lg text-slate-400 hover:text-primary-600 hover:bg-primary-50 transition-all opacity-0 group-hover:opacity-100">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M16.862 3.487a2.25 2.25 0 013.182 3.181L7.5 19.213l-4.5 1 1-4.5 12.862-12.226z" />
                                </svg>
                            </button>
                            <button type="button" aria-label="Supprimer"
                                class="p-2 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50 transition-all opacity-0 group-hover:opacity-100">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
