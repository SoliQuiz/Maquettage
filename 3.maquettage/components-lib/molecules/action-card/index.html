<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
</head>

<body class="p-4">
    <!-- Action Card (Component from Preline UI) -->
    <a class="group flex flex-col bg-white border border-soli shadow-sm rounded-xl hover:shadow-md transition-all h-full max-w-sm"
        href="#">
        <div class="p-4 md:p-5">
            <div class="flex items-center gap-x-3">
                <div class="size-10 flex justify-center items-center bg-soli-action/10 rounded-lg">
                    <svg class="flex-shrink-0 size-6 text-soli-action" xmlns="http://www.w3.org/2000/svg" width="24"
                        height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v10" />
                        <path d="M18.4 4.6a9 9 0 1 1-12.8 0" />
                    </svg>
                </div>
                <h3 class="group-hover:text-soli-action font-semibold text-soli-dark transition-colors">
                    Commencer un QCM
                </h3>
            </div>
            <p class="mt-3 text-sm text-soli-muted leading-relaxed">
                Accédez aux questionnaires du jour liés à vos objectifs pédagogiques.
            </p>
            <div class="mt-5 flex items-center gap-x-1 text-sm font-medium text-soli-action">
                Commencer
                <svg class="flex-shrink-0 size-4 transition-transform group-hover:translate-x-1"
                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                </svg>
            </div>
        </div>
    </a>
</body>

</html>
