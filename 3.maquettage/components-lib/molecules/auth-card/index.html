<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule: Auth Card - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' }, secondary: { 500: '#14b8a6' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-slate-50 via-primary-50 to-slate-100 font-sans flex items-center justify-center p-4">

    <div class="w-full max-w-sm">

        <!-- Logo grande version -->
        <div class="flex flex-col items-center mb-8">
            <div
                class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center shadow-lg mb-4">
                <span class="text-white font-heading font-bold text-3xl leading-none">SQ</span>
            </div>
            <h1 class="font-heading font-bold text-2xl text-slate-900">SoliQuiz</h1>
            <p class="text-sm text-slate-500 mt-1">Plateforme d'auto-évaluation QCM</p>
        </div>

        <!-- Card formulaire -->
        <div class="bg-white rounded-2xl shadow-md border border-slate-100 p-8">
            <h2 class="font-heading font-semibold text-xl text-slate-800 mb-6 text-center">Connectez-vous à votre espace
            </h2>

            <form class="space-y-5" novalidate>
                <!-- Email -->
                <div class="flex flex-col gap-1.5">
                    <label for="auth-email" class="text-sm font-semibold text-slate-700">Adresse email</label>
                    <input type="email" id="auth-email" name="email" placeholder="votre@email.com" required
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-slate-800 text-sm bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 hover:border-slate-400 transition-all duration-200" />
                </div>

                <!-- Password -->
                <div class="flex flex-col gap-1.5">
                    <label for="auth-password" class="text-sm font-semibold text-slate-700">Mot de passe</label>
                    <input type="password" id="auth-password" name="password" placeholder="••••••••" required
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-slate-800 text-sm bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 hover:border-slate-400 transition-all duration-200" />
                </div>

                <!-- CTA -->
                <button type="submit"
                    class="w-full flex items-center justify-center px-5 py-3 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-xl shadow-sm hover:shadow-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary-400 focus:ring-offset-2 mt-2">
                    Se connecter à mon espace
                </button>
            </form>

            <div class="mt-5 text-center">
                <a href="#"
                    class="text-xs text-slate-400 hover:text-slate-600 underline-offset-2 hover:underline transition-colors">Un
                    problème de connexion ?</a>
            </div>
        </div>

    </div>

</body>

</html>
