<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule: Question Block - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 400: '#818cf8', 500: '#6366f1', 100: '#e0e7ff' }, secondary: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans p-8 max-w-2xl mx-auto space-y-10">

    <!-- Question à choix UNIQUE (Radio) -->
    <section aria-labelledby="q1-label">
        <div class="mb-5">
            <span class="text-xs text-slate-400 font-medium uppercase tracking-widest">Question 2 / 10</span>
            <h2 id="q1-label" class="font-heading font-semibold text-xl text-slate-900 mt-2 leading-snug">
                Quelle méthode JavaScript permet de parcourir un tableau sans possibilité d'utiliser <code
                    class="font-mono bg-slate-100 px-1 rounded text-base text-primary-600">break</code> ?
            </h2>
        </div>

        <fieldset>
            <legend
                class="inline-flex items-center gap-2 text-sm font-semibold text-primary-700 bg-primary-50 border border-primary-100 rounded-lg px-3 py-1 mb-4">
                <span class="w-2 h-2 rounded-full bg-primary-500"></span>
                Sélectionnez UNE seule réponse
            </legend>
            <div class="space-y-3">
                <label
                    class="flex items-start gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-primary-400 hover:bg-primary-50 transition-all duration-150 group">
                    <input type="radio" name="q1-radio" value="a"
                        class="mt-0.5 h-5 w-5 text-primary-600 border-slate-300 focus:ring-primary-500 cursor-pointer" />
                    <span class="text-sm text-slate-700 font-normal">for classique</span>
                </label>
                <label
                    class="flex items-start gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-primary-400 hover:bg-primary-50 transition-all duration-150 group">
                    <input type="radio" name="q1-radio" value="b"
                        class="mt-0.5 h-5 w-5 text-primary-600 border-slate-300 focus:ring-primary-500 cursor-pointer" />
                    <span class="text-sm text-slate-700 font-normal">for...of</span>
                </label>
                <label
                    class="flex items-start gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-primary-400 hover:bg-primary-50 transition-all duration-150 group">
                    <input type="radio" name="q1-radio" value="c"
                        class="mt-0.5 h-5 w-5 text-primary-600 border-slate-300 focus:ring-primary-500 cursor-pointer" />
                    <span class="text-sm text-slate-700 font-normal">forEach</span>
                </label>
            </div>
        </fieldset>
    </section>

    <!-- Question à choix MULTIPLES (Checkbox) -->
    <section aria-labelledby="q2-label">
        <div class="mb-5">
            <span class="text-xs text-slate-400 font-medium uppercase tracking-widest">Question 5 / 10</span>
            <h2 id="q2-label" class="font-heading font-semibold text-xl text-slate-900 mt-2 leading-snug">
                Quelles sont les méthodes qui retournent un nouveau tableau ?
            </h2>
        </div>

        <fieldset>
            <legend
                class="inline-flex items-center gap-2 text-sm font-semibold text-teal-700 bg-teal-50 border border-teal-100 rounded-lg px-3 py-1 mb-4">
                <span class="w-2 h-2 rounded-sm bg-teal-500"></span>
                Sélectionnez TOUTES les bonnes réponses
            </legend>
            <div class="space-y-3">
                <label
                    class="flex items-start gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-teal-400 hover:bg-teal-50 transition-all duration-150 group">
                    <input type="checkbox" name="q2-check" value="a"
                        class="mt-0.5 h-5 w-5 rounded text-teal-600 border-slate-300 focus:ring-teal-500 cursor-pointer" />
                    <span class="text-sm text-slate-700 font-normal">map()</span>
                </label>
                <label
                    class="flex items-start gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-teal-400 hover:bg-teal-50 transition-all duration-150 group">
                    <input type="checkbox" name="q2-check" value="b"
                        class="mt-0.5 h-5 w-5 rounded text-teal-600 border-slate-300 focus:ring-teal-500 cursor-pointer" />
                    <span class="text-sm text-slate-700 font-normal">filter()</span>
                </label>
                <label
                    class="flex items-start gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-teal-400 hover:bg-teal-50 transition-all duration-150 group">
                    <input type="checkbox" name="q2-check" value="c"
                        class="mt-0.5 h-5 w-5 rounded text-teal-600 border-slate-300 focus:ring-teal-500 cursor-pointer" />
                    <span class="text-sm text-slate-700 font-normal">forEach()</span>
                </label>
            </div>
        </fieldset>
    </section>

</body>

</html>
