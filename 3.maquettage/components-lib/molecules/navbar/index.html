<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule: Navbar - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 500: '#6366f1', 600: '#4f46e5' }, secondary: { 500: '#14b8a6' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans">

    <!-- Navbar Étudiant -->
    <header
        class="flex flex-wrap sm:justify-start sm:flex-nowrap z-50 w-full bg-white border-b border-gray-200 text-sm py-3 dark:bg-neutral-800 dark:border-neutral-700">
        <nav class="max-w-6xl w-full mx-auto px-4 flex items-center justify-between gap-x-2 sm:gap-x-4">
            <a href="#" class="flex items-center gap-x-2 text-xl font-semibold dark:text-white">
                <div class="size-8 flex-shrink-0 bg-blue-600 flex items-center justify-center rounded-lg shadow-sm">
                    <span class="text-white font-bold text-xs uppercase">SQ</span>
                </div>
                <span class="font-bold text-lg text-gray-800 dark:text-neutral-200">SoliQuiz</span>
            </a>

            <div class="flex items-center gap-x-2">
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg bg-blue-50 text-blue-600 dark:bg-blue-400/10 dark:text-blue-400"
                    href="#" aria-current="page">
                    Tableau de bord
                </a>
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg text-gray-500 hover:text-blue-600 dark:text-neutral-500 dark:hover:text-blue-400"
                    href="#">
                    Historique
                </a>
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg text-gray-500 hover:text-red-600 dark:text-neutral-500 dark:hover:text-red-400"
                    href="#">
                    Déconnexion
                </a>
            </div>
        </nav>
    </header>

    <div class="p-8 text-slate-400 text-sm text-center">↑ Navbar Étudiant</div>

    <!-- Navbar Formateur (variante) -->
    <header
        class="flex flex-wrap sm:justify-start sm:flex-nowrap z-50 w-full bg-slate-900 border-b border-slate-700 text-sm py-3 px-4 dark:bg-neutral-900 dark:border-neutral-800">
        <nav class="max-w-6xl w-full mx-auto flex items-center justify-between gap-x-2 sm:gap-x-4">
            <a href="#" class="flex items-center gap-x-2 text-xl font-semibold text-white">
                <div class="size-8 flex-shrink-0 bg-blue-600 flex items-center justify-center rounded-lg shadow-sm">
                    <span class="text-white font-bold text-xs uppercase">SQ</span>
                </div>
                <span class="font-bold text-lg hidden sm:block">SoliQuiz <span
                        class="ms-1.5 py-0.5 px-1.5 rounded-lg text-[10px] bg-blue-500/10 text-blue-500 border border-blue-500/20 uppercase">Formateur</span></span>
            </a>

            <div class="flex items-center gap-x-2">
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg bg-white/10 text-white"
                    href="#" aria-current="page">
                    Dashboard
                </a>
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-white/10"
                    href="#">
                    Bibliothèque
                </a>
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-white/10"
                    href="#">
                    Suivi
                </a>
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg text-slate-400 hover:text-red-400"
                    href="#">
                    Déconnexion
                </a>
            </div>
        </nav>
    </header>
    <div class="p-8 text-slate-400 text-sm text-center">↑ Navbar Formateur (variante sombre)</div>

</body>

</html>
