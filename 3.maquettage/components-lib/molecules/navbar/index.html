<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule: Navbar - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 500: '#6366f1', 600: '#4f46e5' }, secondary: { 500: '#14b8a6' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans">

    <!-- Navbar Étudiant -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 shadow-sm">
        <nav role="navigation" aria-label="Navigation principale"
            class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <!-- Logo atom -->
            <a href="#" class="inline-flex items-center gap-2 group" aria-label="SoliQuiz - Accueil">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center">
                    <span class="text-white font-heading font-bold text-sm">SQ</span>
                </div>
                <span class="font-heading font-bold text-lg text-slate-900">SoliQuiz</span>
            </a>

            <!-- Links -->
            <div class="hidden md:flex items-center gap-1">
                <a href="#" aria-current="page"
                    class="px-4 py-2 text-sm font-semibold text-primary-600 bg-primary-50 rounded-lg transition-colors">Tableau
                    de bord</a>
                <a href="#"
                    class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors">Historique</a>
                <button type="button"
                    class="ml-4 px-4 py-2 text-sm font-medium text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                    Déconnexion
                </button>
            </div>

            <!-- Mobile toggle -->
            <button type="button" class="md:hidden p-2 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors"
                aria-label="Ouvrir le menu">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </nav>
    </header>

    <div class="p-8 text-slate-400 text-sm text-center">↑ Navbar Étudiant</div>

    <!-- Navbar Formateur (variante) -->
    <header class="sticky top-0 z-50 bg-slate-900 border-b border-slate-700 shadow-md">
        <nav role="navigation" aria-label="Navigation formateur"
            class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="#" class="inline-flex items-center gap-2 group">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center">
                    <span class="text-white font-heading font-bold text-sm">SQ</span>
                </div>
                <span class="font-heading font-bold text-lg text-white">SoliQuiz <span
                        class="text-slate-400 font-normal text-sm ml-1">Formateur</span></span>
            </a>
            <div class="hidden md:flex items-center gap-1">
                <a href="#" aria-current="page"
                    class="px-4 py-2 text-sm font-semibold text-white bg-white/10 rounded-lg transition-colors">Tableau
                    de bord</a>
                <a href="#"
                    class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-white/10 rounded-lg transition-colors">Bibliothèque
                    QCM</a>
                <a href="#"
                    class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-white/10 rounded-lg transition-colors">Suivis
                    Classes</a>
                <button type="button"
                    class="ml-4 px-3 py-2 text-xs font-medium text-slate-400 hover:text-red-400 hover:bg-red-900/20 rounded-lg transition-colors">Déconnexion</button>
            </div>
        </nav>
    </header>
    <div class="p-8 text-slate-400 text-sm text-center">↑ Navbar Formateur (variante sombre)</div>

</body>

</html>
