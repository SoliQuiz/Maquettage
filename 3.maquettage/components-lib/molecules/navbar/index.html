<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
</head>

<body class="p-4">
    <!-- Navbar (Component from Preline UI) -->
    <header
        class="flex flex-wrap sm:justify-start sm:flex-nowrap z-50 w-full bg-white border-b border-soli text-sm py-2.5 sm:py-4">
        <nav class="max-w-7xl flex basis-full items-center w-full mx-auto px-4 sm:px-6 lg:px-8" aria-label="Global">
            <div class="me-5 md:me-8">
                <a class="flex-none text-xl font-bold text-soli-dark" href="#" aria-label="Brand">Soli<span
                        class="text-soli-action">Quiz</span></a>
            </div>

            <div class="flex items-center gap-x-2 ms-auto py-1 md:ps-6 md:order-3">
                <button type="button"
                    class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-soli bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none transition-all duration-300">
                    Connexion
                </button>

                <div class="md:hidden">
                    <button type="button"
                        class="hs-collapse-toggle p-2 inline-flex justify-center items-center gap-2 rounded-lg border border-soli font-medium bg-white text-gray-700 shadow-sm align-middle hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-white focus:ring-soli-action transition-all text-sm"
                        data-hs-collapse="#navbar-alignment" aria-controls="navbar-alignment"
                        aria-label="Toggle navigation">
                        <svg class="hs-collapse-open:hidden w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24"
                            height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" x2="21" y1="6" y2="6" />
                            <line x1="3" x2="21" y1="12" y2="12" />
                            <line x1="3" x2="21" y1="18" y2="18" />
                        </svg>
                        <svg class="hs-collapse-open:block hidden w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24"
                            height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18" />
                            <path d="m6 6 12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="navbar-alignment"
                class="hs-collapse hidden overflow-hidden transition-all duration-300 basis-full grow md:block md:w-auto md:basis-auto md:order-2">
                <div class="flex flex-col gap-5 mt-5 md:flex-row md:items-center md:mt-0 md:ps-5">
                    <a class="font-medium text-soli-action" href="#" aria-current="page">Accueil</a>
                    <a class="font-medium text-gray-600 hover:text-soli-action transition-colors" href="#">Mes QCM</a>
                    <a class="font-medium text-gray-600 hover:text-soli-action transition-colors" href="#">Résultats</a>
                </div>
            </div>
        </nav>
    </header>
</body>

</html>
