<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoliQuiz — Connexion</title>
    <meta name="description"
        content="Accédez à votre espace SoliQuiz, la plateforme d'auto-évaluation QCM de votre bootcamp.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }, secondary: { 500: '#14b8a6', 600: '#0d9488' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-slate-50 via-primary-50 to-slate-100 font-sans flex items-center justify-center p-4">

    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 rounded-full bg-primary-100 opacity-60 blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 rounded-full bg-secondary-500 opacity-10 blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-sm mx-auto">
        <!-- Logo large -->
        <div class="flex flex-col items-center mb-8">
            <div class="size-16 flex-shrink-0 bg-blue-600 flex items-center justify-center rounded-2xl shadow-lg mb-4">
                <span class="text-white font-bold text-3xl">SQ</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 dark:text-white">SoliQuiz</h1>
            <p class="text-sm text-gray-500 dark:text-neutral-400 mt-1">Plateforme d'auto-évaluation QCM</p>
        </div>

        <!-- Auth Card -->
        <div
            class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8 dark:bg-neutral-900 dark:border-neutral-800">
            <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-6 text-center">Connectez-vous à votre espace
            </h2>

            <form class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium mb-2 dark:text-white">Adresse email</label>
                    <input type="email" id="email"
                        class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600"
                        placeholder="votre@solilms.ma" required>
                </div>
                <div>
                    <div class="flex justify-between items-center">
                        <label for="password" class="block text-sm font-medium mb-2 dark:text-white">Mot de
                            passe</label>
                    </div>
                    <input type="password" id="password"
                        class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600"
                        placeholder="••••••••" required>
                </div>
                <div class="flex items-center">
                    <div class="flex">
                        <input id="remember-me" name="remember-me" type="checkbox"
                            class="shrink-0 mt-0.5 border-gray-200 rounded text-blue-600 focus:ring-blue-500 dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800">
                    </div>
                    <div class="ms-3">
                        <label for="remember-me" class="text-sm dark:text-white">Se souvenir de moi</label>
                    </div>
                </div>
                <button type="submit"
                    class="w-full py-3 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none dark:focus:outline-none dark:focus:ring-1 dark:focus:ring-gray-600">
                    Se connecter à mon espace
                    <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m9 18 6-6-6-6" />
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center">
                <a class="text-sm text-blue-600 hover:text-blue-700 font-medium dark:text-blue-500" href="#">
                    Un problème de connexion ?
                </a>
            </div>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-sm text-gray-500 dark:text-neutral-500">© 2026 SoliQuiz · Bootcamp</p>
        </footer>
    </div>

</body>

</html>
