<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoliQuiz — Connexion</title>
    <meta name="description"
        content="Accédez à votre espace SoliQuiz, la plateforme d'auto-évaluation QCM de votre bootcamp.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }, secondary: { 500: '#14b8a6', 600: '#0d9488' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-slate-50 via-primary-50 to-slate-100 font-sans flex items-center justify-center p-4">

    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 rounded-full bg-primary-100 opacity-60 blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 rounded-full bg-secondary-500 opacity-10 blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-sm">
        <!-- Logo large -->
        <div class="flex flex-col items-center mb-8">
            <div
                class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center shadow-lg mb-4">
                <span class="text-white font-heading font-bold text-3xl leading-none">SQ</span>
            </div>
            <h1 class="font-heading font-bold text-2xl text-slate-900">SoliQuiz</h1>
            <p class="text-sm text-slate-500 mt-1">Plateforme d'auto-évaluation QCM</p>
        </div>

        <!-- Auth Card -->
        <div class="bg-white rounded-2xl shadow-md border border-slate-100 p-8">
            <h2 class="font-heading font-semibold text-xl text-slate-800 mb-6 text-center">Connectez-vous à votre espace
            </h2>

            <form class="space-y-5" novalidate>
                <div class="flex flex-col gap-1.5">
                    <label for="email" class="text-sm font-semibold text-slate-700">Adresse email</label>
                    <input type="email" id="email" name="email" placeholder="votre@solilms.ma" required
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 hover:border-slate-400 transition-all duration-200" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label for="password" class="text-sm font-semibold text-slate-700">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 hover:border-slate-400 transition-all duration-200" />
                </div>
                <button type="submit"
                    class="w-full flex items-center justify-center gap-2 px-5 py-3 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-xl shadow-sm hover:shadow-md transition-all duration-200 mt-2 focus:outline-none focus:ring-2 focus:ring-primary-400 focus:ring-offset-2">
                    Se connecter à mon espace
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </button>
            </form>

            <div class="mt-5 text-center">
                <a href="#"
                    class="text-xs text-slate-400 hover:text-primary-600 underline-offset-2 hover:underline transition-colors">Un
                    problème de connexion ?</a>
            </div>
        </div>

        <footer class="mt-6 text-center">
            <p class="text-xs text-slate-400">© 2026 SoliQuiz · Bootcamp</p>
        </footer>
    </div>

</body>

</html>
