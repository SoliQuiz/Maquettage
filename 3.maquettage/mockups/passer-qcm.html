<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Interface d'évaluation interactive SoliQuiz. Répondez aux questions et validez vos compétences.">
    <title>Passer un QCM - SoliQuiz</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>
    <link rel="stylesheet" href="../charte-graphique/style.css">
</head>

<body class="bg-gray-50 h-full flex flex-col font-sans">

    <!-- Header (Simple Layout for Quiz) -->
    <header class="bg-white border-b border-soli sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-4 md:py-6">
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <a href="dashboard.html" class="text-soli-muted hover:text-soli-dark transition-colors">
                            <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                        </a>
                        <h1 class="text-lg font-bold text-soli-dark truncate max-w-[200px] sm:max-w-md">Algorithmes de
                            Tri J05</h1>
                    </div>
                    <div class="flex items-center">
                        <span
                            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold bg-red-50 text-red-700 border border-red-100">
                            <span class="relative flex h-2 w-2">
                                <span
                                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                            </span>
                            ⏱ 12:45
                        </span>
                    </div>
                </div>

                <!-- Progress Line -->
                <div class="flex flex-col gap-1.5">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-soli-muted uppercase tracking-wider">Progression</span>
                        <span class="text-[10px] font-bold text-soli-dark">Questions 3 / 10 complétées</span>
                    </div>
                    <div class="flex w-full h-2 bg-gray-100 rounded-full overflow-hidden" role="progressbar"
                        aria-valuenow="30" aria-valuemin="0" aria-valuemax="100">
                        <div class="flex flex-col justify-center overflow-hidden bg-soli-action transition-all duration-500"
                            style="width: 30%"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col">
        <div class="flex-1 max-w-3xl w-full mx-auto px-4 py-8 md:py-12">

            <!-- Question Zone -->
            <div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">

                <!-- Question Header -->
                <div class="space-y-4">
                    <div class="flex items-center gap-2">
                        <span
                            class="px-2 py-0.5 bg-soli-dark text-white text-[10px] font-bold rounded uppercase">Question
                            3</span>
                        <span
                            class="px-2 py-0.5 bg-gray-100 text-gray-600 text-[10px] font-bold rounded uppercase border border-gray-200">🔘
                            Choix Unique</span>
                    </div>
                    <h2 class="text-xl md:text-2xl font-bold text-soli-dark leading-tight">
                        Quelle est la complexité temporelle moyenne de l'algorithme "Quick Sort" ?
                    </h2>
                </div>

                <!-- Choices -->
                <div class="grid space-y-3">
                    <label for="q3-a1"
                        class="group flex p-4 w-full bg-white border border-soli rounded-xl text-sm focus-within:border-soli-action focus-within:ring-1 focus-within:ring-soli-action hover:bg-soli-action/5 hover:border-soli-action cursor-pointer transition-all shadow-sm">
                        <input type="radio" name="quiz-q3"
                            class="shrink-0 mt-0.5 border-gray-300 rounded-full text-soli-action focus:ring-soli-action size-5"
                            id="q3-a1">
                        <div class="ms-4">
                            <span class="block text-sm font-semibold text-soli-dark">O(n)</span>
                        </div>
                    </label>

                    <label for="q3-a2"
                        class="group flex p-4 w-full bg-white border border-soli rounded-xl text-sm focus-within:border-soli-action focus-within:ring-1 focus-within:ring-soli-action hover:bg-soli-action/5 hover:border-soli-action cursor-pointer transition-all shadow-sm">
                        <input type="radio" name="quiz-q3"
                            class="shrink-0 mt-0.5 border-gray-300 rounded-full text-soli-action focus:ring-soli-action size-5"
                            id="q3-a2" checked>
                        <div class="ms-4">
                            <span class="block text-sm font-semibold text-soli-dark">O(n log n)</span>
                        </div>
                    </label>

                    <label for="q3-a3"
                        class="group flex p-4 w-full bg-white border border-soli rounded-xl text-sm focus-within:border-soli-action focus-within:ring-1 focus-within:ring-soli-action hover:bg-soli-action/5 hover:border-soli-action cursor-pointer transition-all shadow-sm">
                        <input type="radio" name="quiz-q3"
                            class="shrink-0 mt-0.5 border-gray-300 rounded-full text-soli-action focus:ring-soli-action size-5"
                            id="q3-a3">
                        <div class="ms-4">
                            <span class="block text-sm font-semibold text-soli-dark">O(n²)</span>
                        </div>
                    </label>

                    <label for="q3-a4"
                        class="group flex p-4 w-full bg-white border border-soli rounded-xl text-sm focus-within:border-soli-action focus-within:ring-1 focus-within:ring-soli-action hover:bg-soli-action/5 hover:border-soli-action cursor-pointer transition-all shadow-sm">
                        <input type="radio" name="quiz-q3"
                            class="shrink-0 mt-0.5 border-gray-300 rounded-full text-soli-action focus:ring-soli-action size-5"
                            id="q3-a4">
                        <div class="ms-4">
                            <span class="block text-sm font-semibold text-soli-dark">O(1)</span>
                        </div>
                    </label>
                </div>

                <!-- Auto-save indicator -->
                <div class="flex items-center gap-1.5 text-soli-success">
                    <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span class="text-[11px] font-bold uppercase tracking-wider">Réponses sauvegardées
                        automatiquement</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Quiz Navigation Footer -->
    <footer class="bg-white border-t border-soli py-4 sticky bottom-0 z-50">
        <div class="max-w-3xl mx-auto px-4 flex justify-between items-center">
            <button
                class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-soli bg-white text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none transition-all duration-300">
                <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Précédent
            </button>

            <button
                class="py-2 px-5 inline-flex items-center gap-x-2 text-sm font-bold rounded-lg border border-transparent bg-soli-action text-white hover:bg-soli-dark shadow-sm focus:outline-none transition-all duration-300">
                Suivant
                <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </footer>

</body>

</html>
