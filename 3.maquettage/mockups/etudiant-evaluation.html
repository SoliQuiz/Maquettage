<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoliQuiz — Évaluation en cours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5' }, secondary: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <!-- Evaluation Header (fixe) -->
    <header
        class="sticky top-0 z-50 flex flex-wrap sm:justify-start sm:flex-nowrap w-full bg-white border-b border-gray-200 text-sm py-3 dark:bg-neutral-800 dark:border-neutral-700">
        <nav class="max-w-4xl w-full mx-auto px-4 flex items-center justify-between gap-x-4">
            <div class="flex items-center gap-x-3">
                <div class="size-8 flex-shrink-0 bg-blue-600 flex items-center justify-center rounded-lg shadow-sm">
                    <span class="text-white font-bold text-xs">SQ</span>
                </div>
                <h1 class="text-base font-semibold text-gray-800 truncate dark:text-neutral-200">
                    QCM – Algorithmique Avancée S3
                </h1>
            </div>

            <div class="flex items-center gap-x-4">
                <span
                    class="hidden sm:inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-teal-100 text-teal-800 dark:bg-teal-800/30 dark:text-teal-500">
                    <span class="size-1.5 inline-block rounded-full bg-teal-800 dark:bg-teal-500"></span>
                    Sauvegardé
                </span>

                <span
                    class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-sm font-bold bg-gray-100 text-gray-800 dark:bg-white/10 dark:text-white border border-gray-200 dark:border-neutral-700">
                    <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    15:30
                </span>
            </div>
        </nav>
    </header>

    <main class="flex-1 max-w-3xl mx-auto px-4 py-10 w-full space-y-10">
        <!-- Progress Stepper -->
        <div class="space-y-3">
            <div class="flex justify-between items-center text-sm">
                <div class="flex items-center gap-x-2">
                    <span
                        class="size-6 flex items-center justify-center bg-blue-600 text-white rounded-full text-[10px] font-bold">2</span>
                    <span class="font-bold text-gray-800 dark:text-white">Question 2 / 10</span>
                </div>
                <span
                    class="font-bold text-blue-600 dark:text-blue-500 bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded-lg">20%
                    complété</span>
            </div>
            <div class="flex w-full h-2.5 bg-gray-200 rounded-full overflow-hidden dark:bg-neutral-700"
                role="progressbar" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100">
                <div class="flex flex-col justify-center overflow-hidden bg-blue-600 dark:bg-blue-500 rounded-full transition-all duration-700 ease-in-out"
                    style="width: 20%"></div>
            </div>
        </div>

        <!-- Question Block -->
        <section
            class="bg-white border border-gray-200 shadow-xl rounded-2xl p-6 sm:p-10 dark:bg-neutral-900 dark:border-neutral-800 relative overflow-hidden">
            <!-- Decorative gradient -->
            <div
                class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-blue-500/5 to-transparent rounded-bl-full pointer-events-none">
            </div>

            <div class="mb-8">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white leading-tight">
                    Quelle méthode JavaScript permet de parcourir un tableau sans possibilité d'utiliser <code
                        class="font-mono bg-red-50 px-2 py-1 rounded text-red-600 dark:bg-red-900/20 dark:text-red-400 mx-1">break</code>
                    ?
                </h2>
            </div>

            <div
                class="bg-blue-50 border border-blue-100 text-sm text-blue-800 rounded-xl p-4 dark:bg-blue-800/10 dark:border-blue-900 dark:text-blue-500 mb-8 flex gap-3">
                <svg class="size-5 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 16v-4" />
                    <path d="M12 8h.01" />
                </svg>
                <span><strong>Consigne :</strong> Sélectionnez UNE seule réponse parmi les choix suivants.</span>
            </div>

            <div class="grid gap-y-4">
                <label for="q2-a"
                    class="group flex p-4 w-full bg-white border border-gray-200 rounded-xl text-sm hover:border-blue-500 hover:bg-blue-50/50 dark:bg-neutral-900 dark:border-neutral-700 dark:hover:border-blue-500 dark:hover:bg-neutral-800 transition-all cursor-pointer">
                    <input type="radio" name="q2" id="q2-a"
                        class="shrink-0 mt-0.5 size-5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800">
                    <span
                        class="text-base font-medium text-gray-700 ms-4 dark:text-neutral-300 group-hover:text-blue-700 dark:group-hover:text-blue-400 transition-colors">for
                        classique</span>
                </label>

                <label for="q2-b"
                    class="group flex p-4 w-full bg-white border border-gray-200 rounded-xl text-sm hover:border-blue-500 hover:bg-blue-50/50 dark:bg-neutral-900 dark:border-neutral-700 dark:hover:border-blue-500 dark:hover:bg-neutral-800 transition-all cursor-pointer">
                    <input type="radio" name="q2" id="q2-b"
                        class="shrink-0 mt-0.5 size-5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800">
                    <span
                        class="text-base font-medium text-gray-700 ms-4 dark:text-neutral-300 group-hover:text-blue-700 dark:group-hover:text-blue-400 transition-colors">for...of</span>
                </label>

                <label for="q2-c"
                    class="group flex p-4 w-full bg-white border border-gray-200 rounded-xl text-sm hover:border-blue-500 hover:bg-blue-50/50 dark:bg-neutral-900 dark:border-neutral-700 dark:hover:border-blue-500 dark:hover:bg-neutral-800 transition-all cursor-pointer">
                    <input type="radio" name="q2" id="q2-c"
                        class="shrink-0 mt-0.5 size-5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800">
                    <span
                        class="text-base font-medium text-gray-700 ms-4 dark:text-neutral-300 group-hover:text-blue-700 dark:group-hover:text-blue-400 transition-colors">forEach()</span>
                </label>

                <label for="q2-d"
                    class="group flex p-4 w-full bg-white border border-gray-200 rounded-xl text-sm hover:border-blue-500 hover:bg-blue-50/50 dark:bg-neutral-900 dark:border-neutral-700 dark:hover:border-blue-500 dark:hover:bg-neutral-800 transition-all cursor-pointer">
                    <input type="radio" name="q2" id="q2-d"
                        class="shrink-0 mt-0.5 size-5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800">
                    <span
                        class="text-base font-medium text-gray-700 ms-4 dark:text-neutral-300 group-hover:text-blue-700 dark:group-hover:text-blue-400 transition-colors">while</span>
                </label>
            </div>
        </section>

        <!-- Action Bar -->
        <div class="flex items-center justify-between gap-x-4">
            <button type="button"
                class="py-2.5 px-6 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-xl border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-800">
                <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                Précédente
            </button>
            <a href="etudiant-resultats.html"
                class="py-2.5 px-10 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-xl border border-transparent bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none dark:focus:outline-none dark:focus:ring-1 dark:focus:ring-gray-600">
                Question suivante
                <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                </svg>
            </a>
        </div>
        <div class="mt-8 text-center">
            <button type="button"
                class="inline-flex items-center gap-x-1 text-sm font-medium text-gray-500 hover:text-blue-600 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-500 dark:hover:text-blue-500">
                Soumettre toutes mes réponses
            </button>
        </div>
    </main>

</body>

</html>
