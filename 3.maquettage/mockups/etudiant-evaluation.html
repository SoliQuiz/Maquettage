<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoliQuiz — Évaluation en cours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5' }, secondary: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <!-- Evaluation Header (fixe) -->
    <header class="sticky top-0 z-50 bg-white border-b border-slate-100 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center shrink-0">
                    <span class="text-white font-heading font-bold text-sm">SQ</span></div>
                <h1 class="font-heading font-semibold text-base text-slate-900 truncate">QCM – Algorithmique Avancée S3
                </h1>
            </div>
            <div class="flex items-center gap-3 shrink-0">
                <span class="hidden sm:inline-flex items-center gap-1.5 text-xs text-slate-400 font-medium">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>Sauvegardé
                </span>
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl bg-white border border-slate-200 shadow-sm"
                    role="timer" aria-label="Temps restant">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span class="text-base font-mono font-bold text-slate-800">15:30</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-3xl mx-auto px-4 py-8 w-full">
        <!-- Progress Stepper -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm text-slate-500">Question <strong class="text-slate-800">2</strong> / 10</span>
                <span class="text-sm font-semibold text-primary-600">20% complété</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-3" role="progressbar" aria-valuenow="20" aria-valuemin="0"
                aria-valuemax="100">
                <div class="bg-gradient-to-r from-primary-500 to-secondary-500 h-3 rounded-full transition-all duration-300"
                    style="width:20%"></div>
            </div>
        </div>

        <!-- Question Block -->
        <section class="bg-white rounded-2xl p-8 shadow-sm border border-slate-200 mb-6">
            <span class="text-xs text-slate-400 font-medium uppercase tracking-widest">Question 2 / 10</span>
            <h2 class="font-heading font-semibold text-xl text-slate-900 mt-3 mb-6 leading-snug">
                Quelle méthode JavaScript permet de parcourir un tableau sans possibilité d'utiliser <code
                    class="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-primary-600 text-base">break</code> ?
            </h2>

            <fieldset>
                <legend
                    class="inline-flex items-center gap-2 text-sm font-semibold text-primary-700 bg-primary-50 border border-primary-100 rounded-lg px-3 py-1 mb-5">
                    <span class="w-2 h-2 rounded-full bg-primary-500"></span>
                    Sélectionnez UNE seule réponse
                </legend>
                <div class="space-y-3">
                    <label
                        class="flex items-center gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-primary-400 hover:bg-primary-50 transition-all duration-150 group">
                        <input type="radio" name="q2" value="a"
                            class="h-5 w-5 text-primary-600 border-slate-300 focus:ring-primary-500 cursor-pointer" />
                        <span class="text-sm text-slate-700 font-normal">for classique</span>
                    </label>
                    <label
                        class="flex items-center gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-primary-400 hover:bg-primary-50 transition-all duration-150 group">
                        <input type="radio" name="q2" value="b"
                            class="h-5 w-5 text-primary-600 border-slate-300 focus:ring-primary-500 cursor-pointer" />
                        <span class="text-sm text-slate-700 font-normal">for...of</span>
                    </label>
                    <label
                        class="flex items-center gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-primary-400 hover:bg-primary-50 transition-all duration-150 group">
                        <input type="radio" name="q2" value="c"
                            class="h-5 w-5 text-primary-600 border-slate-300 focus:ring-primary-500 cursor-pointer" />
                        <span class="text-sm text-slate-700 font-normal">forEach()</span>
                    </label>
                    <label
                        class="flex items-center gap-3 cursor-pointer p-4 rounded-xl border border-slate-200 bg-white hover:border-primary-400 hover:bg-primary-50 transition-all duration-150 group">
                        <input type="radio" name="q2" value="d"
                            class="h-5 w-5 text-primary-600 border-slate-300 focus:ring-primary-500 cursor-pointer" />
                        <span class="text-sm text-slate-700 font-normal">while</span>
                    </label>
                </div>
            </fieldset>
        </section>

        <!-- Action Bar -->
        <div class="flex items-center justify-between gap-4">
            <button type="button"
                class="inline-flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-300 text-slate-700 text-sm font-semibold rounded-xl hover:bg-slate-50 transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5m0 0l5-5m-5 5h12" />
                </svg>
                Précédente
            </button>
            <a href="etudiant-resultats.html"
                class="inline-flex items-center gap-2 px-8 py-2.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-xl shadow-sm hover:shadow-md transition-all duration-200">
                Question suivante
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </a>
        </div>
        <div class="mt-6 text-center">
            <button type="button"
                class="text-sm text-slate-400 hover:text-primary-600 hover:underline transition-colors">Soumettre toutes
                mes réponses</button>
        </div>
    </main>

</body>

</html>
