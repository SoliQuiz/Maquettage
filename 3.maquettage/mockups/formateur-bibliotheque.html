<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoliQuiz — Bibliothèque de QCM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5' }, secondary: { 500: '#14b8a6' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <!-- Navbar Formateur (sombre) -->
    <header
        class="sticky top-0 z-50 flex flex-wrap sm:justify-start sm:flex-nowrap w-full bg-slate-900 border-b border-slate-700 text-sm py-3 dark:bg-neutral-800 dark:border-neutral-700">
        <nav class="max-w-6xl w-full mx-auto px-4 flex items-center justify-between gap-x-4">
            <a href="formateur-dashboard.html" class="flex items-center gap-x-3 text-white">
                <div class="size-8 flex-shrink-0 bg-blue-600 flex items-center justify-center rounded-lg shadow-sm">
                    <span class="text-white font-bold text-xs">SQ</span>
                </div>
                <span class="font-bold text-lg hidden sm:block">SoliQuiz <span
                        class="text-slate-400 font-normal text-sm ml-1">Formateur</span></span>
            </a>

            <div class="flex items-center gap-x-2 sm:gap-x-4">
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-white/10 disabled:opacity-50 disabled:pointer-events-none"
                    href="formateur-dashboard.html">
                    Tableau de bord
                </a>
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg bg-white/10 text-white hover:bg-white/20 disabled:opacity-50 disabled:pointer-events-none"
                    href="#">
                    Bibliothèque
                </a>
                <a class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-white/10 disabled:opacity-50 disabled:pointer-events-none hidden md:inline-flex"
                    href="formateur-suivi.html">
                    Suivis
                </a>
            </div>
        </nav>
    </header>

    <main class="flex-1 max-w-6xl mx-auto px-4 py-10 w-full">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Bibliothèque de QCM</h1>
                <p class="text-sm text-gray-500 dark:text-neutral-400">Gérez, créez et modifiez vos questionnaires.</p>
            </div>
            <button type="button"
                class="py-2.5 px-4 inline-flex items-center gap-x-2 text-sm font-semibold rounded-xl border border-transparent bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none dark:focus:outline-none dark:focus:ring-1 dark:focus:ring-gray-600"
                data-hs-overlay="#hs-create-qcm-modal">
                <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="M12 5v14" />
                </svg>
                Nouveau QCM
            </button>
        </div>

        <!-- Table Section -->
        <div
            class="bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden dark:bg-neutral-900 dark:border-neutral-800">
            <!-- Header -->
            <div
                class="px-6 py-4 grid gap-3 md:flex md:justify-between md:items-center border-b border-gray-200 dark:border-neutral-700">
                <div class="relative sm:max-w-xs w-full">
                    <label for="hs-as-table-product-search" class="sr-only">Rechercher</label>
                    <input type="text" id="hs-as-table-product-search" name="hs-as-table-product-search"
                        class="py-2 px-3 ps-9 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600"
                        placeholder="Rechercher un QCM...">
                    <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none ps-3">
                        <svg class="size-4 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                            width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                    </div>
                </div>
            </div>
            <!-- End Header -->

            <!-- Table -->
            <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
                <thead class="bg-gray-50 dark:bg-neutral-800">
                    <tr>
                        <th scope="col"
                            class="px-6 py-3 text-start text-xs font-semibold text-gray-500 uppercase tracking-wider dark:text-neutral-500">
                            Titre & Description</th>
                        <th scope="col"
                            class="px-6 py-3 text-start text-xs font-semibold text-gray-500 uppercase tracking-wider dark:text-neutral-500">
                            Objectif lié</th>
                        <th scope="col"
                            class="px-6 py-3 text-start text-xs font-semibold text-gray-500 uppercase tracking-wider dark:text-neutral-500">
                            Questions</th>
                        <th scope="col"
                            class="px-6 py-3 text-end text-xs font-semibold text-gray-500 uppercase tracking-wider dark:text-neutral-500">
                            Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
                    <tr class="hover:bg-gray-50 dark:hover:bg-neutral-800 transition-colors group">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="block text-sm font-semibold text-gray-800 dark:text-neutral-200">QCM
                                Algorithmique S3</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span
                                class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-800/30 dark:text-blue-500">Boucles
                                & tableaux</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-neutral-500">10</td>
                        <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                            <div
                                class="flex items-center justify-end gap-x-1 opacity-0 group-hover:opacity-100 transition-all">
                                <button type="button"
                                    class="size-8 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent text-gray-500 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-400 dark:hover:bg-neutral-700">
                                    <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
                                        <path d="m15 5 4 4" />
                                    </svg>
                                </button>
                                <button type="button"
                                    class="size-8 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent text-gray-500 hover:bg-red-100 hover:text-red-600 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-400 dark:hover:bg-red-900/20 dark:hover:text-red-500">
                                    <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 6h18" />
                                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                                        <line x1="10" x2="10" y1="11" y2="17" />
                                        <line x1="14" x2="14" y1="11" y2="17" />
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr class="hover:bg-gray-50 dark:hover:bg-neutral-800 transition-colors group">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="block text-sm font-semibold text-gray-800 dark:text-neutral-200">QCM Syntaxe
                                CSS</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span
                                class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-800/30 dark:text-blue-500">Flexbox
                                & Grid</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-neutral-500">8</td>
                        <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                            <div
                                class="flex items-center justify-end gap-x-1 opacity-0 group-hover:opacity-100 transition-all">
                                <button type="button"
                                    class="size-8 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent text-gray-500 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-400 dark:hover:bg-neutral-700">
                                    <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
                                        <path d="m15 5 4 4" />
                                    </svg>
                                </button>
                                <button type="button"
                                    class="size-8 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent text-gray-500 hover:bg-red-100 hover:text-red-600 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-400 dark:hover:bg-red-900/20 dark:hover:text-red-500">
                                    <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 6h18" />
                                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                                        <line x1="10" x2="10" y1="11" y2="17" />
                                        <line x1="14" x2="14" y1="11" y2="17" />
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <!-- End Table -->
        </div>
    </main>

    <!-- Modal Création QCM -->
    <div id="hs-create-qcm-modal"
        class="hs-overlay hidden size-full fixed top-0 start-0 z-[80] overflow-x-hidden overflow-y-auto pointer-events-none">
        <div
            class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto">
            <div
                class="flex flex-col bg-white border shadow-sm rounded-xl pointer-events-auto dark:bg-neutral-800 dark:border-neutral-700 dark:shadow-neutral-700/70">
                <div class="flex justify-between items-center py-3 px-4 border-b dark:border-neutral-700">
                    <h3 class="font-bold text-gray-800 dark:text-white">Nouveau QCM</h3>
                    <button type="button"
                        class="flex justify-center items-center size-7 text-sm font-semibold rounded-full border border-transparent text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-white dark:hover:bg-neutral-700"
                        data-hs-overlay="#hs-create-qcm-modal">
                        <span class="sr-only">Fermer</span>
                        <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18" />
                            <path d="m6 6 12 12" />
                        </svg>
                    </button>
                </div>
                <div class="p-4 overflow-y-auto space-y-4">
                    <div>
                        <label for="qcm-title" class="block text-sm font-medium mb-2 dark:text-white">Titre du
                            QCM</label>
                        <input type="text" id="qcm-title"
                            class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600"
                            placeholder="Ex: Algorithmique S3">
                    </div>
                    <div>
                        <label for="qcm-session" class="block text-sm font-medium mb-2 dark:text-white">Session
                            associée</label>
                        <select id="qcm-session"
                            class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600">
                            <option value="">-- Sélectionner une session --</option>
                            <option>Session Dev Web – Semaine 3</option>
                            <option>Session Algorithmique – Semaine 5</option>
                        </select>
                    </div>
                    <div>
                        <label for="qcm-objectif"
                            class="block text-sm font-medium mb-2 dark:text-white">Micro-objectif</label>
                        <select id="qcm-objectif"
                            class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600">
                            <option value="">-- Sélectionner un objectif --</option>
                            <option>Comprendre les boucles</option>
                            <option>Maîtriser les tableaux JS</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end items-center gap-x-2 py-3 px-4 border-t dark:border-neutral-700">
                    <button type="button"
                        class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-800"
                        data-hs-overlay="#hs-create-qcm-modal">
                        Annuler
                    </button>
                    <button type="button"
                        class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none">
                        Créer le QCM
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
